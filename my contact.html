<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet"href="my contact.css">
</head>
<body>
  <section class="contact" id="contact">
    <p class="contact-eyebrow">Get in touch</p>
    <h2>Let's <span>Work</span><br>Together</h2>
    <p class="contact-sub">Open to collaborations, freelance projects, and building great things. Reach out directly or use the form below.</p>
    <div class="contact-grid">
      <div class="contact-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </div>
        <span class="card-label">Email</span>
        <p class="card-value">
          <a href="mailto:oyebanjodavidoluwalonimi@gmail.com">oyebanjodavidoluwalonimi<br>@gmail.com</a>
        </p>
      </div>
      <div class="contact-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.57 3.38 2 2 0 0 1 3.54 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.72a16 16 0 0 0 5.37 5.37l.88-.88a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <span class="card-label">Phone/WhatsApp</span>
        <p class="card-value">
          <a href="tel:+2348119493211">+234 811 949 3211</a>
        </p>
      </div>
      <div class="contact-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <span class="card-label">Location</span>
        <p class="card-value">Ogun State,<br>Nigeria 🇳🇬</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">Available for new projects</span>
    </div>
  </section>
</body>
</html>
